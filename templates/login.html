{{define "login"}}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login</title>
</head>
<body>
  <h1><a href="/home">HackMe</a></h1>
  <h2>Login</h2>

  <form id="loginForm">
    <div>
      <label for="usernameOrEmail">Username or Email</label><br />
      <input
        id="usernameOrEmail"
        name="usernameOrEmail"
        type="text"
        autocomplete="username"
        required
      />
    </div>

    <div>
      <label for="password">Password</label><br />
      <input
        id="password"
        name="password"
        type="password"
        autocomplete="current-password"
        required
      />
    </div>

    <br />

    <button type="submit">Submit</button>
  </form>

  <p id="errorMessage" style="color: red;"></p>

  <script>
    const form = document.getElementById("loginForm");
    const errorMessage = document.getElementById("errorMessage");

    form.addEventListener("submit", async function (event) {
      event.preventDefault();

      errorMessage.textContent = "";

      const usernameOrEmail = document
        .getElementById("usernameOrEmail")
        .value
        .trim();

      const password = document
        .getElementById("password")
        .value;

      console.log("SEND LOGIN:", {
        usernameOrEmail: usernameOrEmail,
        password: password,
      });

      try {
        const response = await fetch("/auth/login", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
          },
          credentials: "include",
          body: JSON.stringify({
            usernameOrEmail: usernameOrEmail,
            password: password,
          }),
        });

        if (!response.ok) {
          const errorData = await response.json().catch(() => null);

          errorMessage.textContent =
            errorData?.error || "Invalid email/username or password";

          return;
        } else {
          window.location.href = "/home";
        }

        const data = await response.json().catch(() => null);

        console.log("LOGIN SUCCESS:", data);
      } catch (error) {
        console.error("LOGIN ERROR:", error);
        errorMessage.textContent = "Server connection error";
      }
    });
  </script>
</body>
</html>
{{end}}

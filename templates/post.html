{{define "post"}}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Post</title>
</head>
<body>
    <h1>Create Post</h1>

    <form id="postForm" method="post" action="/posts">
        <div>
            <label for="title">Title</label><br>
            <input
                type="text"
                id="title"
                name="title"
                minlength="5"
                maxlength="50"
                required
            >
        </div>

        <br>

        <div>
            <label for="categoryId">Category ID</label><br>
            <input
                type="text"
                id="categoryId"
                name="categoryId"
                required
            >
        </div>

        <br>

        <div>
            <label for="content">Content</label><br>
            <textarea
                id="content"
                name="content"
                minlength="10"
                maxlength="400"
                rows="8"
                cols="50"
                required
            ></textarea>
        </div>

        <br>

        <button type="submit">Create</button>
    </form>

    <p><a href="/home">Back to home</a></p>
</body>
</html>
{{end}}
